name: flutter_cache_video_player
description: "A six-terminal universal audio and video player that caches while watching, supports multi-threaded download, breakpoint resumption, and LRU cache elimination."
version: 0.1.0
homepage:

environment:
  sdk: ^3.11.4
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: ^1.1.1
  plugin_platform_interface: ^2.1.8

  # 数据持久层
  tostore: ^3.1.0

  # 响应式 UI
  breakpoint: ^1.3.2
  signals: ^6.3.0

  # 本地代理 & 网络
  shelf: ^1.4.2
  dio: ^5.9.2

  # 工具
  path_provider: ^2.1.5
  connectivity_plus: ^7.1.1
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.5

flutter:
  plugin:
    platforms:
      android:
        package: com.kurban.flutter_cache_video_player
        pluginClass: FlutterCacheVideoPlayerPlugin
      ios:
        pluginClass: FlutterCacheVideoPlayerPlugin
      linux:
        pluginClass: FlutterCacheVideoPlayerPlugin
      macos:
        pluginClass: FlutterCacheVideoPlayerPlugin
      windows:
        pluginClass: FlutterCacheVideoPlayerPluginCApi
      web:
        pluginClass: FlutterCacheVideoPlayerWeb
        fileName: flutter_cache_video_player_web.dart
