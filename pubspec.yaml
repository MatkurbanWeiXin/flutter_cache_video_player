name: flutter_cache_video_player
description: "A six-terminal universal audio and video player that caches while watching, supports multi-threaded download, breakpoint resumption, and LRU cache elimination."
version: 1.9.0
homepage: https://jsontodart.cn
repository: https://github.com/MatkurbanWeiXin/flutter_cache_video_player

environment:
  sdk: ^3.10.0
  flutter: '>=3.38.1'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: ^1.1.1
  dio: ^5.9.2
  shelf: ^1.4.2
  crypto: ^3.0.7
  tostore: ^3.1.2
  breakpoint: ^1.3.2
  cross_file: ^0.3.5+2
  path_provider: ^2.1.5
  signals_flutter: ^6.3.0
  connectivity_plus: ^7.1.1
  universal_platform: ^1.1.0
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.kurban.flutter_cache_video_player
        pluginClass: FlutterCacheVideoPlayerPlugin
      ios:
        pluginClass: FlutterCacheVideoPlayerPlugin
      linux:
        pluginClass: FlutterCacheVideoPlayerPlugin
      macos:
        pluginClass: FlutterCacheVideoPlayerPlugin
      windows:
        pluginClass: FlutterCacheVideoPlayerPluginCApi
      web:
        pluginClass: FlutterCacheVideoPlayerWeb
        fileName: flutter_cache_video_player_web.dart
